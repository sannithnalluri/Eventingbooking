# Server Configuration
server.port=${PORT:8080}

# Database Configuration (MySQL)
# Database Configuration (MySQL)
# Configured with hardcoded local settings
spring.datasource.url=jdbc:mysql://localhost:3306/chargerdb?createDatabaseIfNotExist=true&useSSL=false
spring.datasource.username=charger
spring.datasource.password=Password@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger/OpenAPI UI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.operationsSorter=alpha
